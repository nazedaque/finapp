name: Qualite Finapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: finapp-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests et dependances
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v6

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verifier les dependances
        run: python -m pip check

      - name: Verifier la syntaxe
        run: >-
          python -m py_compile
          app.py
          finapp_logic.py
          tests/test_app_structure.py
          tests/test_finapp_logic.py

      - name: Executer les tests
        run: python -m unittest discover -s tests -v

  disponibilite:
    name: Disponibilite publique
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verifier que Finapp repond
        run: >-
          curl
          --fail
          --silent
          --show-error
          --retry 3
          --retry-all-errors
          --retry-delay 5
          --max-time 30
          https://pvqbzhsaueniyczathnvm6.streamlit.app/_stcore/health
          > /dev/null
